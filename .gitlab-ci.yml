include:
  - project: 'shared/strix-ci-template'
    file: 'strix-scan.yml'

#==============================================================================
# Windscribe Android CI/CD Pipeline
#==============================================================================
# This pipeline manages the build, test, and deployment workflow for the
# Windscribe Android application (mobile and TV variants).
#
# Pipeline Stages:
#   - Test: Run automated tests
#   - Deploy: Build and deploy to various channels (Play Store, Nexus, etc.)
#
# Key Workflows:
#   1. Internal App Sharing: Quick test URLs from Play Store (auto on develop/main)
#   2. Staging App Sharing: Staging builds with DEV flag (manual)
#   3. Play Store Internal Track: Official internal releases (manual)
#   4. Nexus Public: Public APK distribution (tag-triggered)
#==============================================================================

image: $BASE_CI_IMAGE

#------------------------------------------------------------------------------
# Global Variables
#------------------------------------------------------------------------------
variables:
  # Locale Configuration
  LC_ALL: "en_US.UTF-8"
  LANG: "en_US.UTF-8"

  # Git Strategy
  GIT_STRATEGY: clone

  # Build Paths
  CHANGE_LOG_PATH: "${CI_PROJECT_DIR}/fastlane/metadata/android/en-US/changelogs/"
  BUILD_PROPERTIES_PATH: "${CI_PROJECT_DIR}/config/build.properties"

  # Signing Configuration
  SIGN_KEY_NAME: "release.jks"
  SIGN_KEY_PATH: "${CI_PROJECT_DIR}/${SIGN_KEY_NAME}"
  SIGN_PROPERTIES_PATH: "${CI_PROJECT_DIR}/config/sign.properties"
  GCM_KEY_PATH: "${CI_PROJECT_DIR}/gcm_key.json"

  # Output Paths
  MOBILE_APK_PATH: "${CI_PROJECT_DIR}/mobile/build/outputs/apk/google/release/mobile-google-release.apk"
  TV_APK_PATH: "${CI_PROJECT_DIR}/tv/build/outputs/apk/google/release/tv-google-release.apk"
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  GRADLE_BUILD_CACHE: "$CI_PROJECT_DIR/.gradle/build-cache"

cache:
  key:
    prefix: gradle
    files:
      - gradle/wrapper/gradle-wrapper.properties
      - gradle/libs.versions.toml
  policy: pull-push
  paths:
    - .gradle/caches/
    - .gradle/wrapper/
#------------------------------------------------------------------------------
# Pipeline Stages
#------------------------------------------------------------------------------
stages:
  - Test
  - Deploy

#==============================================================================
# REUSABLE RULES
#==============================================================================
# Shared rule: run on merge requests targeting develop or main.
.mr_to_develop_or_main: &mr_to_develop_or_main
  if: '$CI_PIPELINE_SOURCE == "merge_request_event" && ($CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main")'

#==============================================================================
# REUSABLE JOB TEMPLATES
#==============================================================================
# These templates eliminate duplication and ensure consistency across jobs.
# They should never be run directly - only extended by actual jobs.
#==============================================================================

#------------------------------------------------------------------------------
# .base_android_setup
# Common Android build environment setup used by all build jobs
#------------------------------------------------------------------------------
.base_android_setup:
  before_script:
    # System packages installation
    - apk add curl flock jq swig
    - apk add git make musl-dev build-base cmake ninja zip unzip perl
    - apk add go=1.21.10-r0 --repository=http://dl-cdn.alpinelinux.org/alpine/v3.19/community

    # Fetch secrets from Vault
    - authToken=$(curl -X POST https://pki.int.windscribe.com:8200/v1/auth/approle/login -d "role_id=$role_id&secret_id=$secret_id" | jq --raw-output '.auth.client_token')
    - secretData=$(curl -H "X-Vault-Token:$authToken" -X GET https://pki.int.windscribe.com:8200/v1/kv/cicd/client-android)

    # Extract and save configuration files
    - echo "$secretData" | jq '.data."sign.properties"' | base64 -d -i > $SIGN_PROPERTIES_PATH
    - echo "$secretData" | jq '.data."build.properties"' | base64 -d -i > $BUILD_PROPERTIES_PATH
    - echo "$secretData" | jq '.data.android_play_store_upload_key' | base64 -d -i > $GCM_KEY_PATH
    - echo "$secretData" | jq '.data.android_play_store_sign_key' | base64 -d -i > $SIGN_KEY_PATH

    # Configure build environment
    - export GRADLE_USER_HOME=$(pwd)/.gradle
    - chmod +x ./gradlew

    # Install build tools
    - extras ndk -n 27.2.12479018 -c 3.22.1
    - extras fastlane || (apk --no-cache add ruby ruby-dev && gem install fastlane --force)

#------------------------------------------------------------------------------
# .build_with_version_increment
# Extends base setup and increments build version from Play Store
#------------------------------------------------------------------------------
.build_with_version_increment:
  extends: .base_android_setup
  stage: Deploy
  before_script:
    - !reference [.base_android_setup, before_script]

    # Increment build version
    - apk add patch
    - fastlane updateBuildVersion

    # Export version variables (don't export VERSION_CODE to allow TV to use +1 logic)
    - MOBILE_VERSION_CODE=$(grep -E 'extra\["appVersionCode"\] = ' build.gradle.kts | sed 's/.*= //')
    - export VERSION_NAME=${MAJOR}.${MINOR}.${MOBILE_VERSION_CODE}
    - touch ${CHANGE_LOG_PATH}${MOBILE_VERSION_CODE}.txt
    - export ANDROID_NDK=$(ls -d $ANDROID_SDK_ROOT/ndk/*/ | head -n 1)

#------------------------------------------------------------------------------
# .build_with_version_keep
# Extends base setup and keeps current Play Store build version
#------------------------------------------------------------------------------
.build_with_version_keep:
  extends: .base_android_setup
  stage: Deploy
  before_script:
    - !reference [.base_android_setup, before_script]

    # Keep existing build version from Play Store
    - fastlane keepBuildVersion

    # Export version variables (don't export VERSION_CODE to allow TV to use +1 logic)
    - MOBILE_VERSION_CODE=$(grep -E 'extra\["appVersionCode"\] = ' build.gradle.kts | sed 's/.*= //')
    - export VERSION_NAME=${MAJOR}.${MINOR}.${MOBILE_VERSION_CODE}
    - touch ${CHANGE_LOG_PATH}${MOBILE_VERSION_CODE}.txt
    - export ANDROID_NDK=$(ls -d $ANDROID_SDK_ROOT/ndk/*/ | head -n 1)

#------------------------------------------------------------------------------
# .minimal_setup
# Minimal setup for simple jobs (notifications, etc.)
#------------------------------------------------------------------------------
.minimal_setup:
  stage: Deploy
  before_script:
    - export GRADLE_USER_HOME=$(pwd)/.gradle
    - chmod +x ./gradlew

.debug_setup:
  stage: Test
  before_script:
    - export GRADLE_USER_HOME=$(pwd)/.gradle
    - extras ndk -n 27.2.12479018 -c 3.22.1
    - apk add gcc g++ musl-dev patch

#==============================================================================
# TEST JOBS
#==============================================================================

#------------------------------------------------------------------------------
# Ktlint — Kotlin style check
#------------------------------------------------------------------------------
# Purpose: Enforce Kotlin code style via the ktlint-gradle plugin.
# Trigger: Merge requests targeting develop or main.
# Output: ktlint reports (per module/source set) as artifacts.
# Blocks deploys: yes — a style violation fails the Test stage.
#------------------------------------------------------------------------------
Ktlint:
  stage: Test
  rules:
    - *mr_to_develop_or_main
    - when: manual
      allow_failure: true

  before_script:
    - export GRADLE_USER_HOME=$(pwd)/.gradle
    - chmod +x ./gradlew

  script:
    - ./gradlew ktlintCheck --continue

  artifacts:
    when: always   # upload reports even on failure so violations are inspectable
    expire_in: 1 week
    paths:
      - "**/build/reports/ktlint/**"

#------------------------------------------------------------------------------
# Unit Tests
#------------------------------------------------------------------------------
# Purpose: Run JVM unit tests across :base, :openvpn, :wgtunnel (172 tests).
# Trigger: Merge requests targeting develop or main.
# Output: HTML test reports + JUnit XML (visible inline in the MR "Tests" tab).
# Blocks deploys: yes — failure of this job fails the Test stage, preventing
#                 any Deploy-stage jobs from running.
#------------------------------------------------------------------------------
UnitTests:
  stage: Test
  rules:
    - *mr_to_develop_or_main
    - when: manual
      allow_failure: true

  before_script:
    - export GRADLE_USER_HOME=$(pwd)/.gradle
    - chmod +x ./gradlew

  script:
    - ./gradlew
      :base:testGoogleDebugUnitTest
      :openvpn:testSkeletonDebugUnitTest
      :wgtunnel:testDebugUnitTest
      --continue

  artifacts:
    when: always   # upload reports even on failure so they're inspectable
    expire_in: 1 week
    paths:
      - "**/build/reports/tests/**"
      - "**/build/test-results/**"
    reports:
      junit:
        - "**/build/test-results/test*UnitTest/TEST-*.xml"

#------------------------------------------------------------------------------
# Build Debug APK — arm64 debug build against staging
#------------------------------------------------------------------------------
# Trigger: Merge requests targeting develop or main (auto).
# Doubles as the mobile debug-compile gate: a broken build fails the MR here.
# Produces the APK consumed by the "E2E tests" job.
#------------------------------------------------------------------------------
BuildDebugApk:
  extends: .debug_setup
  stage: Test
  rules:
    - *mr_to_develop_or_main
    - when: manual
      allow_failure: true
  script:
    - export DEV=true
    - ./gradlew :mobile:assembleGoogleDebug -PabiFilter=arm64-v8a --no-daemon
    - mkdir -p maestro-artifacts
    - cp $(find mobile/build/outputs/apk/google/debug -name "*.apk" | head -1) maestro-artifacts/mobile-google-debug.apk
  artifacts:
    name: "maestro-apk-$CI_COMMIT_SHORT_SHA"
    expire_in: 1 day
    paths:
      - maestro-artifacts/mobile-google-debug.apk

#------------------------------------------------------------------------------
# E2E tests — Maestro UI tests on arm64 macOS runner (auto after BuildDebugApk)
#------------------------------------------------------------------------------
# Trigger: Merge requests targeting develop or main (auto, after the build).
# retry: transient emulator boot / network hiccups auto-retry before failing
#        the MR; genuine test failures (script_failure on a re-run) still block.
#------------------------------------------------------------------------------
E2E tests:
  stage: Test
  tags:
    - arm64
  rules:
    - *mr_to_develop_or_main
    - when: manual
      allow_failure: true
  retry:
    max: 2
    when:
      - script_failure
      - runner_system_failure
      - stuck_or_timeout_failure
  needs:
    - job: BuildDebugApk
      artifacts: true
  variables:
    AVD_NAME: "ws_test_avd"
    APK_PATH: "maestro-artifacts/mobile-google-debug.apk"
  before_script:
    - export ANDROID_HOME="${ANDROID_HOME:-$HOME/Library/Android/sdk}"
    - export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator:$HOME/.maestro/bin:$PATH"
    - export JAVA_HOME="$(/usr/libexec/java_home -v 17)"
  script:
    - adb kill-server >/dev/null 2>&1 || true
    - pkill -f "qemu-system.*-avd $AVD_NAME" || true
    - adb start-server
    - nohup emulator -avd "$AVD_NAME" -no-window -no-audio -no-boot-anim -no-snapshot -wipe-data -gpu swiftshader_indirect -accel on > emulator.log 2>&1 &
    - adb wait-for-device
    - |
      elapsed=0
      until test "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" = "1"; do
        if test "$elapsed" -ge 300; then echo "emulator did not boot within 300s"; tail -50 emulator.log; exit 1; fi
        sleep 3; elapsed=$((elapsed + 3))
      done
    - adb install -r "$APK_PATH"
    - caffeinate -dimsu ./maestro/run.sh --skip-build
  after_script:
    - export ANDROID_HOME="${ANDROID_HOME:-$HOME/Library/Android/sdk}"
    - export PATH="$ANDROID_HOME/platform-tools:$PATH"
    - adb -s emulator-5554 emu kill || true
    - pkill -f "qemu-system.*-avd $AVD_NAME" || true
    - mkdir -p maestro-reports
    - cp -R "$HOME/.maestro/tests" maestro-reports/ 2>/dev/null || true
  artifacts:
    when: always
    expire_in: 1 day
    paths:
      - emulator.log
      - maestro-reports/**

#------------------------------------------------------------------------------
# Security Scans (strix)
#------------------------------------------------------------------------------
# Purpose: Security scanning via the shared strix-ci-template.
# Trigger: as defined by the included template.
#------------------------------------------------------------------------------
strix-scan-mr-diff:
  stage: Test
  rules:
    - when: manual
      allow_failure: true

strix-scan-quick:
  stage: Test
  rules:
    - when: manual
      allow_failure: true

strix-scan-standard:
  stage: Test
  rules:
    - when: manual
      allow_failure: true

#==============================================================================
# DEPLOYMENT JOBS
#==============================================================================

#------------------------------------------------------------------------------
# Internal App Sharing Upload (Auto on develop/main)
#------------------------------------------------------------------------------
# Purpose: Quick QA builds with shareable URLs from Play Store
# Trigger: Automatic on successful merge to develop/main branches
# Output: AAB files uploaded to Internal App Sharing (quick test URLs only)
# Slack: Notifies with download URLs
#------------------------------------------------------------------------------
InternalAppSharing:
  extends: .build_with_version_keep
  stage: Deploy
  only:
    refs:
      - develop
      - main

  script:
    # Store version info
    - echo "VERSION_NAME=$VERSION_NAME" >> build.env

    # Build and upload to Internal App Sharing ONLY (quick test URLs)
    - fastlane publishToInternalAppSharing

  artifacts:
    reports:
      dotenv: build.env

#------------------------------------------------------------------------------
# Staging App Sharing Upload (Manual trigger with DEV override)
#------------------------------------------------------------------------------
# Purpose: Staging environment builds for pre-production testing
# Trigger: Manual
# Output: AAB files uploaded to Internal App Sharing (quick test URLs only)
# Slack: Notifies with staging test URLs
# Note: Uses DEV flag to override environment settings for staging
#------------------------------------------------------------------------------
StagingAppSharing:
  extends: .build_with_version_keep
  stage: Deploy
  when: manual

  script:
    # Set DEV flag for staging environment
    - export DEV=true

    # Store version info
    - echo "VERSION_NAME=$VERSION_NAME" >> build.env

    # Build and upload to Internal App Sharing ONLY (quick test URLs)
    - fastlane publishToInternalAppSharing

  artifacts:
    reports:
      dotenv: build.env

#------------------------------------------------------------------------------
# Play Store Internal Track Upload (Manual trigger)
#------------------------------------------------------------------------------
# Purpose: Official internal release to Play Store testing track
# Trigger: Manual
# Output: AAB files uploaded to Play Store Internal Track
# Slack: Notifies release team of new version
#------------------------------------------------------------------------------
PlayStoreInternal:
  extends: .build_with_version_increment
  stage: Deploy
  when: manual

  script:
    # Store version info
    - echo "VERSION_NAME=$VERSION_NAME" >> build.env

    # Build and upload to Play Store Internal Track
    - fastlane publishToPlayStoreInternal

  artifacts:
    reports:
      dotenv: build.env

#------------------------------------------------------------------------------
# Nexus Public Release (Tag-triggered)
#------------------------------------------------------------------------------
# Purpose: Production release builds for public distribution
# Trigger: Automatic on git tags
# Output: APK files uploaded to Nexus public server
#------------------------------------------------------------------------------
NexusPublic:
  extends: .build_with_version_keep
  stage: Deploy
  only:
    - tags
  except:
    - branches

  script:
    # Use private server if DEV flag is set
    - if [ "$DEV" == "true" ]; then NEXUS_SERVER=$NEXUS_SERVER_PRIVATE; fi

    # Store version info
    - echo "VERSION_NAME=$VERSION_NAME" >> build.env
    - export DIRECTORY=${VERSION_NAME}
    - echo $NEXUS_SERVER

    # Build and upload APKs
    - fastlane buildReleaseApk
    - curl --retry 5 --show-error --fail -u "${NEXUS_USERNAME}:${NEXUS_PASSWORD}" --cacert config/cacert.pem --upload-file ${MOBILE_APK_PATH} "${NEXUS_SERVER}${DIRECTORY}/windscribe-mobile.apk"
    - curl --retry 5 --show-error --fail -u "${NEXUS_USERNAME}:${NEXUS_PASSWORD}" --cacert config/cacert.pem --upload-file ${TV_APK_PATH} "${NEXUS_SERVER}${DIRECTORY}/windscribe-tv.apk"

  artifacts:
    reports:
      dotenv: build.env

#------------------------------------------------------------------------------
# Slack Notification (Automatic after Play Store release)
#------------------------------------------------------------------------------
# Purpose: Notify team when new version is available on Play Store
# Trigger: Automatic after PlayStoreInternal job succeeds
#------------------------------------------------------------------------------
SlackNotification:
  extends: .minimal_setup
  stage: Deploy
  when: on_success
  dependencies:
    - PlayStoreInternal
  needs:
    - PlayStoreInternal

  script:
    # Get mobile version code for changelog
    - MOBILE_VERSION_CODE=$(grep -E 'extra\["appVersionCode"\] = ' build.gradle.kts | sed 's/.*= //')
    - export TITLE="Available on Play Store Release $VERSION_NAME"
    - export CHANGE_LOG=$(cat $CHANGE_LOG_PATH${MOBILE_VERSION_CODE}.txt)
    - export SPACE=$'\n\n'
    - export MESSAGE=$TITLE$SPACE$CHANGE_LOG
    - export PAYLOAD={\"text\":\"$MESSAGE\"}
    - curl --retry 5 -X POST $SLACK_URL --show-error --fail -d "$PAYLOAD"

#==============================================================================
# MAINTENANCE JOBS
#==============================================================================

#------------------------------------------------------------------------------
# Build Strongswan Libraries (Manual)
#------------------------------------------------------------------------------
# Purpose: Rebuild Strongswan native libraries for VPN functionality
# Trigger: Manual (only when Strongswan needs updating)
# Output: Compiled native libraries for all Android architectures
#------------------------------------------------------------------------------
BuildStrongswan:
  stage: Deploy
  when: manual
  image: ubuntu:22.04

  before_script:
    # Install system dependencies
    - apt-get update
    - DEBIAN_FRONTEND=noninteractive apt-get install -y locales build-essential automake bison flex gettext gperf libtool pkg-config swig jq curl zip unzip tar cmake git perl golang-go ninja-build openjdk-17-jdk wget zlib1g-dev

    # Set locale
    - locale-gen en_US.UTF-8
    - export LANG=en_US.UTF-8
    - export LC_ALL=en_US.UTF-8

    # Set environment variables
    - export ROOT_DIR=$(pwd)
    - export GRADLE_USER_HOME=$(pwd)/.gradle
    - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
    - export PATH=$JAVA_HOME/bin:$PATH

    # Install Gradle
    - GRADLE_VERSION=8.7
    - wget https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip
    - unzip gradle-${GRADLE_VERSION}-bin.zip -d /opt/gradle
    - export PATH="/opt/gradle/gradle-${GRADLE_VERSION}/bin:$PATH"
    - gradle --version

    # Setup Android SDK
    - mkdir -p /opt/android-sdk/cmdline-tools
    - cd /opt/android-sdk
    - wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
    - unzip tools.zip -d cmdline-tools
    - mv cmdline-tools/cmdline-tools cmdline-tools/latest
    - export ANDROID_SDK_ROOT=/opt/android-sdk
    - export ANDROID_HOME=$ANDROID_SDK_ROOT
    - export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH

    # Install Android SDK components
    - which sdkmanager
    - sdkmanager --version
    - sdkmanager --list
    - yes | sdkmanager --licenses || true
    - sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;$SS_NDK_VERSION"

    # Set NDK environment variables
    - export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/$SS_NDK_VERSION
    - export ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/$SS_NDK_VERSION

    # Build OpenSSL
    - mkdir -p /tmp/openssl-src && cd /tmp/openssl-src
    - wget https://github.com/openssl/openssl/archive/refs/tags/OpenSSL_1_1_1t.tar.gz
    - tar -xzf OpenSSL_1_1_1t.tar.gz
    - export OPENSSL_SRC="$PWD/openssl-OpenSSL_1_1_1t"

  script:
    # Build Strongswan
    - cd "$CI_PROJECT_DIR"
    - rm -rf strongswan-src
    - git clone --branch "$SS_BRANCH" "$SS_REMOTE" strongswan-src
    - chmod +x ./tools/build_strongswan.sh
    - ./tools/build_strongswan.sh "$CI_PROJECT_DIR/strongswan-src" "$OPENSSL_SRC" "$CI_PROJECT_DIR/artifacts"

    # Package artifacts
    - cd "$CI_PROJECT_DIR/artifacts"
    - zip -r strongswan-libs.zip .

  artifacts:
    paths:
      - $CI_PROJECT_DIR/artifacts/strongswan-libs.zip
    expire_in: 1 week