#==============================================================================
# Windscribe Android CI/CD Pipeline
#==============================================================================
# This pipeline manages the build, test, and deployment workflow for the
# Windscribe Android application (mobile and TV variants).
#
# Pipeline Stages:
#   - Test: Run automated tests
#   - Deploy: Build and deploy to various channels (Play Store, Nexus, etc.)
#
# Key Workflows:
#   1. Internal App Sharing: Quick QA builds (auto-triggered on merge)
#   2. Staging App Sharing: Staging environment builds with DEV flag (manual)
#   3. Play Store Internal Track: Official internal releases (manual)
#   4. Nexus Public: Production releases (tag-triggered)
#==============================================================================

image: $CI_REGISTRY_IMAGE

#------------------------------------------------------------------------------
# Global Variables
#------------------------------------------------------------------------------
variables:
  # Locale Configuration
  LC_ALL: "en_US.UTF-8"
  LANG: "en_US.UTF-8"

  # Git Strategy
  GIT_STRATEGY: clone

  # Build Paths
  CHANGE_LOG_PATH: "${CI_PROJECT_DIR}/fastlane/metadata/android/en-US/changelogs/"
  BUILD_PROPERTIES_PATH: "${CI_PROJECT_DIR}/config/build.properties"

  # Signing Configuration
  SIGN_KEY_NAME: "release.jks"
  SIGN_KEY_PATH: "${CI_PROJECT_DIR}/${SIGN_KEY_NAME}"
  SIGN_PROPERTIES_PATH: "${CI_PROJECT_DIR}/config/sign.properties"
  GCM_KEY_PATH: "${CI_PROJECT_DIR}/gcm_key.json"

  # Output Paths
  MOBILE_APK_PATH: "${CI_PROJECT_DIR}/mobile/build/outputs/apk/google/release/mobile-google-release.apk"
  TV_APK_PATH: "${CI_PROJECT_DIR}/tv/build/outputs/apk/google/release/tv-google-release.apk"

  # Cache Configuration
  CCACHE_DIR: "${CI_PROJECT_DIR}/.ccache"

#------------------------------------------------------------------------------
# Cache Configuration
#------------------------------------------------------------------------------
cache:
  paths:
    - .gradle/wrapper
    - .gradle/caches
    - .ccache

#------------------------------------------------------------------------------
# Pipeline Stages
#------------------------------------------------------------------------------
stages:
  - Test
  - Deploy

#==============================================================================
# REUSABLE JOB TEMPLATES
#==============================================================================
# These templates eliminate duplication and ensure consistency across jobs.
# They should never be run directly - only extended by actual jobs.
#==============================================================================

#------------------------------------------------------------------------------
# .base_android_setup
# Common Android build environment setup used by all build jobs
#------------------------------------------------------------------------------
.base_android_setup:
  before_script:
    # System packages installation
    - apk -U upgrade
    - apk --no-cache add curl flock jq swig
    - apk --no-cache add git make musl-dev build-base cmake ninja zip unzip perl
    - apk --no-cache add go=1.21.10-r0 --repository=http://dl-cdn.alpinelinux.org/alpine/v3.19/community

    # Fetch secrets from Vault
    - authToken=$(curl -X POST https://pki.int.windscribe.com:8200/v1/auth/approle/login -d "role_id=$role_id&secret_id=$secret_id" | jq --raw-output '.auth.client_token')
    - secretData=$(curl -H "X-Vault-Token:$authToken" -X GET https://pki.int.windscribe.com:8200/v1/kv/cicd/client-android)

    # Extract and save configuration files
    - echo "$secretData" | jq '.data."sign.properties"' | base64 -d -i > $SIGN_PROPERTIES_PATH
    - echo "$secretData" | jq '.data."build.properties"' | base64 -d -i > $BUILD_PROPERTIES_PATH
    - echo "$secretData" | jq '.data.android_play_store_upload_key' | base64 -d -i > $GCM_KEY_PATH
    - echo "$secretData" | jq '.data.android_play_store_sign_key' | base64 -d -i > $SIGN_KEY_PATH

    # Configure build environment
    - export GRADLE_USER_HOME=$(pwd)/.gradle
    - chmod +x ./gradlew

    # Install build tools
    - extras ndk -n 27.2.12479018 -c 3.22.1
    - extras fastlane || (apk --no-cache add ruby ruby-dev && gem install fastlane --force)

#------------------------------------------------------------------------------
# .build_with_version_increment
# Extends base setup and increments build version from Play Store
#------------------------------------------------------------------------------
.build_with_version_increment:
  extends: .base_android_setup
  stage: Deploy
  before_script:
    - !reference [.base_android_setup, before_script]

    # Increment build version
    - apk add patch
    - fastlane updateBuildVersion

    # Export version variables
    - export VERSION_CODE=$(grep -E "appVersionCode = " build.gradle | sed 's/.*appVersionCode = //')
    - export VERSION_NAME=${MAJOR}.${MINOR}.${VERSION_CODE}
    - touch ${CHANGE_LOG_PATH}${VERSION_CODE}.txt
    - export ANDROID_NDK=$(ls -d $ANDROID_SDK_ROOT/ndk/*/ | head -n 1)

#------------------------------------------------------------------------------
# .build_with_version_keep
# Extends base setup and keeps current Play Store build version
#------------------------------------------------------------------------------
.build_with_version_keep:
  extends: .base_android_setup
  stage: Deploy
  before_script:
    - !reference [.base_android_setup, before_script]

    # Keep existing build version from Play Store
    - fastlane keepBuildVersion

    # Export version variables
    - export VERSION_CODE=$(grep -E "appVersionCode = " build.gradle | sed 's/.*appVersionCode = //')
    - export VERSION_NAME=${MAJOR}.${MINOR}.${VERSION_CODE}
    - touch ${CHANGE_LOG_PATH}${VERSION_CODE}.txt
    - export ANDROID_NDK=$(ls -d $ANDROID_SDK_ROOT/ndk/*/ | head -n 1)

#------------------------------------------------------------------------------
# .minimal_setup
# Minimal setup for simple jobs (notifications, etc.)
#------------------------------------------------------------------------------
.minimal_setup:
  stage: Deploy
  before_script:
    - apk --no-cache add curl
    - extras fastlane || (apk --no-cache add ruby ruby-dev && gem install fastlane --force)

#==============================================================================
# DEPLOYMENT JOBS
#==============================================================================

#------------------------------------------------------------------------------
# Internal App Sharing Upload (Automatic on merge to develop/main)
#------------------------------------------------------------------------------
# Purpose: Quick QA builds with shareable URLs
# Trigger: Automatic on successful merge to develop/main branches only
# Output: AAB files + APK files + Quick test URLs
# Slack: Notifies with download URLs
#------------------------------------------------------------------------------
InternalAppSharing:
  extends: .build_with_version_keep
  stage: Deploy
  when: on_success
  only:
    - develop
    - main

  script:
    # Store version info for dependent jobs
    - echo "VERSION_CODE=$VERSION_CODE" >> build.env
    - echo "VERSION_NAME=$VERSION_NAME" >> build.env
    - export DIRECTORY=${VERSION_NAME}

    # Build and upload to Internal App Sharing (quick test URLs)
    - fastlane publishToInternalAppSharing

    # Build APKs for Nexus distribution
    - fastlane buildReleaseApk

    # Upload to Nexus private channel
    - curl --retry 5 --show-error --fail -u "${NEXUS_USERNAME}:${NEXUS_PASSWORD}" --cacert config/cacert.pem --upload-file ${MOBILE_APK_PATH} "${NEXUS_SERVER_PRIVATE}${DIRECTORY}/windscribe-mobile.apk"
    - curl --retry 5 --show-error --fail -u "${NEXUS_USERNAME}:${NEXUS_PASSWORD}" --cacert config/cacert.pem --upload-file ${TV_APK_PATH} "${NEXUS_SERVER_PRIVATE}${DIRECTORY}/windscribe-tv.apk"

  artifacts:
    reports:
      dotenv: build.env

#------------------------------------------------------------------------------
# Staging App Sharing Upload (Manual trigger with DEV override)
#------------------------------------------------------------------------------
# Purpose: Staging environment builds for pre-production testing
# Trigger: Manual
# Output: AAB files + APK files + Quick test URLs (with DEV=true)
# Slack: Notifies with staging test URLs
# Note: Uses DEV flag to override environment settings for staging
#------------------------------------------------------------------------------
StagingAppSharing:
  extends: .build_with_version_keep
  stage: Deploy
  when: manual

  script:
    # Set DEV flag for staging environment
    - export DEV=true

    # Store version info for dependent jobs
    - echo "VERSION_CODE=$VERSION_CODE" >> build.env
    - echo "VERSION_NAME=$VERSION_NAME" >> build.env
    - export DIRECTORY=${VERSION_NAME}

    # Build and upload to Internal App Sharing (quick test URLs)
    - fastlane publishToInternalAppSharing

    # Build APKs for Nexus distribution
    - fastlane buildReleaseApk

    # Upload to Nexus (uses DEV override, points to staging/private server)
    - if [ "$DEV" == "true" ]; then NEXUS_SERVER=$NEXUS_SERVER_PRIVATE; fi
    - curl --retry 5 --show-error --fail -u "${NEXUS_USERNAME}:${NEXUS_PASSWORD}" --cacert config/cacert.pem --upload-file ${MOBILE_APK_PATH} "${NEXUS_SERVER}${DIRECTORY}/windscribe-mobile-staging.apk"
    - curl --retry 5 --show-error --fail -u "${NEXUS_USERNAME}:${NEXUS_PASSWORD}" --cacert config/cacert.pem --upload-file ${TV_APK_PATH} "${NEXUS_SERVER}${DIRECTORY}/windscribe-tv-staging.apk"

  artifacts:
    reports:
      dotenv: build.env

#------------------------------------------------------------------------------
# Play Store Internal Track Upload (Manual trigger)
#------------------------------------------------------------------------------
# Purpose: Official internal release to Play Store testing track
# Trigger: Manual
# Output: AAB files uploaded to Play Store Internal Track
# Slack: Notifies release team of new version
#------------------------------------------------------------------------------
PlayStoreInternal:
  extends: .build_with_version_increment
  stage: Deploy
  when: manual

  script:
    # Store version info
    - echo "VERSION_CODE=$VERSION_CODE" >> build.env
    - echo "VERSION_NAME=$VERSION_NAME" >> build.env

    # Build and upload to Play Store Internal Track
    - fastlane publishToPlayStoreInternal

  artifacts:
    reports:
      dotenv: build.env

#------------------------------------------------------------------------------
# Nexus Public Release (Tag-triggered)
#------------------------------------------------------------------------------
# Purpose: Production release builds for public distribution
# Trigger: Automatic on git tags
# Output: APK files uploaded to Nexus public server
#------------------------------------------------------------------------------
NexusPublic:
  extends: .build_with_version_keep
  stage: Deploy
  only:
    - tags
  except:
    - branches

  script:
    # Use private server if DEV flag is set
    - if [ "$DEV" == "true" ]; then NEXUS_SERVER=$NEXUS_SERVER_PRIVATE; fi

    # Store version info
    - echo "VERSION_CODE=$VERSION_CODE" >> build.env
    - echo "VERSION_NAME=$VERSION_NAME" >> build.env
    - export DIRECTORY=${VERSION_NAME}
    - echo $NEXUS_SERVER

    # Build and upload APKs
    - fastlane buildReleaseApk
    - curl --retry 5 --show-error --fail -u "${NEXUS_USERNAME}:${NEXUS_PASSWORD}" --cacert config/cacert.pem --upload-file ${MOBILE_APK_PATH} "${NEXUS_SERVER}${DIRECTORY}/windscribe-mobile.apk"
    - curl --retry 5 --show-error --fail -u "${NEXUS_USERNAME}:${NEXUS_PASSWORD}" --cacert config/cacert.pem --upload-file ${TV_APK_PATH} "${NEXUS_SERVER}${DIRECTORY}/windscribe-tv.apk"

  artifacts:
    reports:
      dotenv: build.env

#------------------------------------------------------------------------------
# Slack Notification (Automatic after Play Store release)
#------------------------------------------------------------------------------
# Purpose: Notify team when new version is available on Play Store
# Trigger: Automatic after PlayStoreInternal job succeeds
#------------------------------------------------------------------------------
SlackNotification:
  extends: .minimal_setup
  stage: Deploy
  when: on_success
  dependencies:
    - PlayStoreInternal
  needs:
    - PlayStoreInternal

  script:
    - export TITLE="Available on Play Store Release $VERSION_NAME"
    - export CHANGE_LOG=$(cat $CHANGE_LOG_PATH${VERSION_CODE}.txt)
    - export SPACE=$'\n\n'
    - export MESSAGE=$TITLE$SPACE$CHANGE_LOG
    - export PAYLOAD={\"text\":\"$MESSAGE\"}
    - curl --retry 5 -X POST $SLACK_URL --show-error --fail -d "$PAYLOAD"

#==============================================================================
# MAINTENANCE JOBS
#==============================================================================

#------------------------------------------------------------------------------
# Build Strongswan Libraries (Manual)
#------------------------------------------------------------------------------
# Purpose: Rebuild Strongswan native libraries for VPN functionality
# Trigger: Manual (only when Strongswan needs updating)
# Output: Compiled native libraries for all Android architectures
#------------------------------------------------------------------------------
BuildStrongswan:
  stage: Deploy
  when: manual
  image: ubuntu:22.04

  before_script:
    # Install system dependencies
    - apt-get update
    - DEBIAN_FRONTEND=noninteractive apt-get install -y locales build-essential automake bison flex gettext gperf libtool pkg-config swig jq curl zip unzip tar cmake git perl golang-go ninja-build openjdk-17-jdk wget zlib1g-dev

    # Set locale
    - locale-gen en_US.UTF-8
    - export LANG=en_US.UTF-8
    - export LC_ALL=en_US.UTF-8

    # Set environment variables
    - export ROOT_DIR=$(pwd)
    - export GRADLE_USER_HOME=$(pwd)/.gradle
    - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
    - export PATH=$JAVA_HOME/bin:$PATH

    # Install Gradle
    - GRADLE_VERSION=8.7
    - wget https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip
    - unzip gradle-${GRADLE_VERSION}-bin.zip -d /opt/gradle
    - export PATH="/opt/gradle/gradle-${GRADLE_VERSION}/bin:$PATH"
    - gradle --version

    # Setup Android SDK
    - mkdir -p /opt/android-sdk/cmdline-tools
    - cd /opt/android-sdk
    - wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
    - unzip tools.zip -d cmdline-tools
    - mv cmdline-tools/cmdline-tools cmdline-tools/latest
    - export ANDROID_SDK_ROOT=/opt/android-sdk
    - export ANDROID_HOME=$ANDROID_SDK_ROOT
    - export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH

    # Install Android SDK components
    - which sdkmanager
    - sdkmanager --version
    - sdkmanager --list
    - yes | sdkmanager --licenses || true
    - sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;$SS_NDK_VERSION"

    # Set NDK environment variables
    - export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/$SS_NDK_VERSION
    - export ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/$SS_NDK_VERSION

    # Build OpenSSL
    - mkdir -p /tmp/openssl-src && cd /tmp/openssl-src
    - wget https://github.com/openssl/openssl/archive/refs/tags/OpenSSL_1_1_1t.tar.gz
    - tar -xzf OpenSSL_1_1_1t.tar.gz
    - export OPENSSL_SRC="$PWD/openssl-OpenSSL_1_1_1t"

  script:
    # Build Strongswan
    - cd "$CI_PROJECT_DIR"
    - rm -rf strongswan-src
    - git clone --branch "$SS_BRANCH" "$SS_REMOTE" strongswan-src
    - chmod +x ./tools/build_strongswan.sh
    - ./tools/build_strongswan.sh "$CI_PROJECT_DIR/strongswan-src" "$OPENSSL_SRC" "$CI_PROJECT_DIR/artifacts"

    # Package artifacts
    - cd "$CI_PROJECT_DIR/artifacts"
    - zip -r strongswan-libs.zip .

  artifacts:
    paths:
      - $CI_PROJECT_DIR/artifacts/strongswan-libs.zip
    expire_in: 1 week
