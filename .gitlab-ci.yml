include:
  - project: 'shared/strix-ci-template'
    file: 'strix-scan.yml'

# Windscribe Android CI/CD. Stages: Test (lint/unit/E2E) → Deploy (Play Store,
# Nexus, App Sharing). Test jobs run on bare-metal arm64 macs (.metal_arm64);
# deploy jobs in the Alpine Docker image (.docker_* + .build_with_version).

image: $BASE_CI_IMAGE

variables:
  LC_ALL: "en_US.UTF-8"
  LANG: "en_US.UTF-8"
  GIT_STRATEGY: clone
  CHANGE_LOG_PATH: "${CI_PROJECT_DIR}/fastlane/metadata/android/en-US/changelogs/"
  BUILD_PROPERTIES_PATH: "${CI_PROJECT_DIR}/config/build.properties"
  SIGN_KEY_NAME: "release.jks"
  SIGN_KEY_PATH: "${CI_PROJECT_DIR}/${SIGN_KEY_NAME}"
  SIGN_PROPERTIES_PATH: "${CI_PROJECT_DIR}/config/sign.properties"
  GCM_KEY_PATH: "${CI_PROJECT_DIR}/gcm_key.json"
  MOBILE_APK_PATH: "${CI_PROJECT_DIR}/mobile/build/outputs/apk/google/release/mobile-google-release.apk"
  TV_APK_PATH: "${CI_PROJECT_DIR}/tv/build/outputs/apk/google/release/tv-google-release.apk"
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"
  GRADLE_BUILD_CACHE: "$CI_PROJECT_DIR/.gradle/build-cache"

cache:
  key:
    prefix: gradle
    files:
      - gradle/wrapper/gradle-wrapper.properties
      - gradle/libs.versions.toml
  policy: pull-push
  paths:
    - .gradle/caches/
    - .gradle/wrapper/

stages:
  - Maintenance
  - Test
  - Deploy

# ── Templates (extend-only) ──────────────────────────────────────────────────

# MRs targeting develop or main.
.mr_to_develop_or_main: &mr_to_develop_or_main
  if: '$CI_PIPELINE_SOURCE == "merge_request_event" && ($CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main")'

# Toolchain env (toolchain itself is baked into $BASE_CI_IMAGE).
.docker_android_toolchain:
  before_script:
    - export GRADLE_USER_HOME=$(pwd)/.gradle
    - chmod +x ./gradlew

# Fetch signing/build secrets from Vault, write to disk.
.docker_vault_secrets:
  before_script:
    - 'echo "VAULT_LOGIN_URL=[${VAULT_LOGIN_URL}] VAULT_SECRET_URL=[${VAULT_SECRET_URL}]"'
    - authToken=$(curl -X POST "$VAULT_LOGIN_URL" -d "role_id=$role_id&secret_id=$secret_id" | jq --raw-output '.auth.client_token')
    - secretData=$(curl -H "X-Vault-Token:$authToken" -X GET "$VAULT_SECRET_URL")
    - echo "$secretData" | jq '.data."sign.properties"' | base64 -d -i > $SIGN_PROPERTIES_PATH
    - echo "$secretData" | jq '.data."build.properties"' | base64 -d -i > $BUILD_PROPERTIES_PATH
    - echo "$secretData" | jq '.data.android_play_store_upload_key' | base64 -d -i > $GCM_KEY_PATH
    - echo "$secretData" | jq '.data.android_play_store_sign_key' | base64 -d -i > $SIGN_KEY_PATH

# Export VERSION_NAME / NDK once the version is set (not VERSION_CODE — TV adds +1).
.docker_version_env:
  before_script:
    - MOBILE_VERSION_CODE=$(grep -E 'extra\["appVersionCode"\] = ' build.gradle.kts | sed 's/.*= //')
    - export VERSION_NAME=${MAJOR}.${MINOR}.${MOBILE_VERSION_CODE}
    - touch ${CHANGE_LOG_PATH}${MOBILE_VERSION_CODE}.txt
    - export ANDROID_NDK=$(ls -d $ANDROID_SDK_ROOT/ndk/*/ | head -n 1)

# Full deploy setup. VERSION_LANE = keepBuildVersion (default) | updateBuildVersion.
.build_with_version:
  stage: Deploy
  variables:
    VERSION_LANE: keepBuildVersion
  before_script:
    - !reference [.docker_android_toolchain, before_script]
    - !reference [.docker_vault_secrets, before_script]
    - fastlane "$VERSION_LANE"
    - !reference [.docker_version_env, before_script]

# Bare-metal arm64 mac runner
.metal_arm64:
  stage: Test
  resource_group: arm64-gradle
  tags:
    - arm64
  before_script:
    - brew install flock
    - brew install coreutils
    - export PATH="/opt/homebrew/opt/coreutils/libexec/gnubin:$PATH"
    - export GRADLE_USER_HOME=$(pwd)/.gradle
    - export ANDROID_HOME="${ANDROID_HOME:-$HOME/Library/Android/sdk}"
    - export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator:$HOME/.maestro/bin:$PATH"
    - export JAVA_HOME="$(/usr/libexec/java_home -v 17)"
    - chmod +x ./gradlew

# ── Test jobs ─────────────────────────────────────────────────────────────────

# Kotlin style check.
Ktlint:
  extends: .metal_arm64
  rules:
    - *mr_to_develop_or_main
    - when: manual
      allow_failure: true

  script:
    - ./gradlew ktlintCheck --continue

  artifacts:
    when: always
    expire_in: 1 day
    paths:
      - "**/build/reports/ktlint/**"

# JVM unit tests
UnitTests:
  extends: .metal_arm64
  rules:
    - *mr_to_develop_or_main
    - when: manual
      allow_failure: true

  script:
    - ./gradlew
      :base:testGoogleDebugUnitTest
      :openvpn:testSkeletonDebugUnitTest
      :wgtunnel:testDebugUnitTest
      --continue

  artifacts:
    when: always
    expire_in: 1 day
    paths:
      - "**/build/reports/tests/**"
      - "**/build/test-results/**"
    reports:
      junit:
        - "**/build/test-results/test*UnitTest/TEST-*.xml"

# End to end critical flow tests on device.
E2E tests:
  extends: .metal_arm64
  rules:
    - *mr_to_develop_or_main
    - when: manual
      allow_failure: true
  retry:
    max: 2
    when:
      - script_failure
      - runner_system_failure
      - stuck_or_timeout_failure
  variables:
    AVD_NAME: "ws_test_avd"
    APK_PATH: "maestro-artifacts/mobile-google-debug.apk"
  script:
    # DEV=true points login at staging (avoids the production captcha).
    - export DEV=true
    - ./gradlew :mobile:assembleGoogleDebug -PabiFilter=arm64-v8a --no-daemon
    - mkdir -p maestro-artifacts
    - cp $(find mobile/build/outputs/apk/google/debug -name "*.apk" | head -1) "$APK_PATH"
    - adb kill-server >/dev/null 2>&1 || true
    - pkill -f "qemu-system.*-avd $AVD_NAME" || true
    - adb start-server
    - nohup emulator -avd "$AVD_NAME" -no-window -no-audio -no-boot-anim -no-snapshot -wipe-data -gpu swiftshader_indirect -accel on > emulator.log 2>&1 &
    - adb wait-for-device
    - |
      elapsed=0
      until test "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" = "1"; do
        if test "$elapsed" -ge 300; then echo "emulator did not boot within 300s"; tail -50 emulator.log; exit 1; fi
        sleep 3; elapsed=$((elapsed + 3))
      done
    - adb install -r "$APK_PATH"
    - caffeinate -dimsu ./maestro/run.sh --skip-build
  after_script:
    - export ANDROID_HOME="${ANDROID_HOME:-$HOME/Library/Android/sdk}"
    - export PATH="$ANDROID_HOME/platform-tools:$PATH"
    - adb -s emulator-5554 emu kill || true
    - pkill -f "qemu-system.*-avd $AVD_NAME" || true
    - mkdir -p maestro-reports
    - cp -R "$HOME/.maestro/tests" maestro-reports/ 2>/dev/null || true
  artifacts:
    when: always
    expire_in: 1 day
    paths:
      - emulator.log
      - maestro-reports/**
      - maestro-artifacts/mobile-google-debug.apk

# ART Baseline generation.
GenerateBaselineProfile:
  extends: .metal_arm64
  rules:
    - when: manual
      allow_failure: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  variables:
    AVD_NAME: "ws_test_avd"
  script:
    - '[[ -z "${TEST_EMAIL:-}" || -z "${TEST_PASSWORD:-}" ]] && { echo "TEST_EMAIL/TEST_PASSWORD required"; exit 1; } || true'
    - adb kill-server >/dev/null 2>&1 || true
    - pkill -f "qemu-system.*-avd $AVD_NAME" || true
    - adb start-server
    - nohup emulator -avd "$AVD_NAME" -no-window -no-audio -no-boot-anim -no-snapshot -wipe-data -gpu swiftshader_indirect -accel on > emulator.log 2>&1 &
    - adb wait-for-device
    - |
      elapsed=0
      until test "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" = "1"; do
        if test "$elapsed" -ge 300; then echo "emulator did not boot within 300s"; tail -50 emulator.log; exit 1; fi
        sleep 3; elapsed=$((elapsed + 3))
      done
    # DEV=true points login at staging; copies profile into mobile/src/googleRelease/.
    - |
      DEV=true caffeinate -dimsu ./gradlew :mobile:generateGoogleReleaseBaselineProfile \
        -PuseConnectedDevices=true \
        -Pandroid.testInstrumentationRunnerArguments.TEST_EMAIL="$TEST_EMAIL" \
        -Pandroid.testInstrumentationRunnerArguments.TEST_PASSWORD="$TEST_PASSWORD" \
        --no-daemon
    - git diff --stat mobile/src || true
  after_script:
    - export ANDROID_HOME="${ANDROID_HOME:-$HOME/Library/Android/sdk}"
    - export PATH="$ANDROID_HOME/platform-tools:$PATH"
    - adb -s emulator-5554 emu kill || true
    - pkill -f "qemu-system.*-avd $AVD_NAME" || true
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - emulator.log
      - mobile/src/**/generated/baselineProfiles/**

# Security scans via the shared strix-ci-template.
strix-scan-mr-diff:
  stage: Test
  tags:
    - arm64
  rules:
    - when: manual
      allow_failure: true

strix-scan-quick:
  stage: Test
  tags:
    - arm64
  rules:
    - when: manual
      allow_failure: true

strix-scan-standard:
  stage: Test
  tags:
    - arm64
  rules:
    - when: manual
      allow_failure: true

# ── Deploy jobs ───────────────────────────────────────────────────────────────

# Internal App Sharing (auto on develop/main).
InternalAppSharing:
  extends: .build_with_version
  stage: Deploy
  only:
    refs:
      - develop
      - main

  script:
    - echo "VERSION_NAME=$VERSION_NAME" >> build.env
    - fastlane publishToInternalAppSharing

  artifacts:
    reports:
      dotenv: build.env

# Internal App Sharing, staging build (DEV=true). Manual.
StagingAppSharing:
  extends: .build_with_version
  stage: Deploy
  when: manual

  script:
    - export DEV=true
    - echo "VERSION_NAME=$VERSION_NAME" >> build.env
    - fastlane publishToInternalAppSharing

  artifacts:
    reports:
      dotenv: build.env

# Play Store internal track (bumps build number). Manual.
PlayStoreInternal:
  extends: .build_with_version
  stage: Deploy
  when: manual
  variables:
    VERSION_LANE: updateBuildVersion

  script:
    - echo "VERSION_NAME=$VERSION_NAME" >> build.env
    - fastlane publishToPlayStoreInternal

  artifacts:
    reports:
      dotenv: build.env

# Public APK release to Nexus (tag-triggered).
NexusPublic:
  extends: .build_with_version
  stage: Deploy
  only:
    - tags
  except:
    - branches

  script:
    - if [ "$DEV" == "true" ]; then NEXUS_SERVER=$NEXUS_SERVER_PRIVATE; fi
    - echo "VERSION_NAME=$VERSION_NAME" >> build.env
    - export DIRECTORY=${VERSION_NAME}
    - echo $NEXUS_SERVER
    - fastlane buildReleaseApk
    - curl --retry 5 --show-error --fail -u "${NEXUS_USERNAME}:${NEXUS_PASSWORD}" --cacert config/cacert.pem --upload-file ${MOBILE_APK_PATH} "${NEXUS_SERVER}${DIRECTORY}/windscribe-mobile.apk"
    - curl --retry 5 --show-error --fail -u "${NEXUS_USERNAME}:${NEXUS_PASSWORD}" --cacert config/cacert.pem --upload-file ${TV_APK_PATH} "${NEXUS_SERVER}${DIRECTORY}/windscribe-tv.apk"

  artifacts:
    reports:
      dotenv: build.env

# Slack release notification (after PlayStoreInternal).
SlackNotification:
  stage: Deploy
  when: on_success
  dependencies:
    - PlayStoreInternal
  needs:
    - PlayStoreInternal

  script:
    - MOBILE_VERSION_CODE=$(grep -E 'extra\["appVersionCode"\] = ' build.gradle.kts | sed 's/.*= //')
    - export TITLE="Available on Play Store Release $VERSION_NAME"
    - export CHANGE_LOG=$(cat $CHANGE_LOG_PATH${MOBILE_VERSION_CODE}.txt)
    - export SPACE=$'\n\n'
    - export MESSAGE=$TITLE$SPACE$CHANGE_LOG
    - export PAYLOAD={\"text\":\"$MESSAGE\"}
    - curl --retry 5 -X POST $SLACK_URL --show-error --fail -d "$PAYLOAD"

# ── Maintenance ───────────────────────────────────────────────────────────────

# Build & push the deploy-stage CI image.
BuildDeployImage:
  stage: Maintenance
  when: manual
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    # CI_REGISTRY_IMAGE is empty here, so derive the path from CI_REGISTRY + project.
    - IMAGE="${CI_REGISTRY_IMAGE:-$CI_REGISTRY/$CI_PROJECT_PATH}/android-deploy:latest"
    - echo "Building $IMAGE"
    - docker build -f ci/android-deploy.Dockerfile -t "$IMAGE" .
    - docker push "$IMAGE"
    - echo "Pushed:$IMAGE"

# Build & push the Strongswan-build CI image.
BuildStrongswanImage:
  stage: Maintenance
  when: manual
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    # CI_REGISTRY_IMAGE is empty here, so derive the path from CI_REGISTRY + project.
    - IMAGE="${CI_REGISTRY_IMAGE:-$CI_REGISTRY/$CI_PROJECT_PATH}/strongswan-build:latest"
    - echo "Building $IMAGE"
    - docker build -f ci/strongswan-build.Dockerfile -t "$IMAGE" .
    - docker push "$IMAGE"
    - echo "Pushed:$IMAGE"

# Rebuild Strongswan native libs.
BuildStrongswan:
  stage: Maintenance
  when: manual
  image: $STRONGSWAN_CI_IMAGE

  before_script:
    - export ROOT_DIR=$(pwd)
    - export GRADLE_USER_HOME=$(pwd)/.gradle

  script:
    - cd "$CI_PROJECT_DIR"
    - rm -rf strongswan-src
    - git clone --branch "$SS_BRANCH" "$SS_REMOTE" strongswan-src
    - chmod +x ./tools/build_strongswan.sh
    - ./tools/build_strongswan.sh "$CI_PROJECT_DIR/strongswan-src" "$OPENSSL_SRC" "$CI_PROJECT_DIR/artifacts"
    - cd "$CI_PROJECT_DIR/artifacts"
    - zip -r strongswan-libs.zip .

  artifacts:
    paths:
      - $CI_PROJECT_DIR/artifacts/strongswan-libs.zip
    expire_in: 1 week