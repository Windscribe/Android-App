appId: com.windscribe.vpn
tags:
  - vpn
  - native
  - ui
---
# Verifies all four server list tabs are tappable and the correct list is visible.
# Tab icon IDs: tab_all, tab_fav, tab_static, tab_config (ServerListNavigation.kt)
# List root IDs: server_list_all, server_list_fav, server_list_static, server_list_config
- launchApp:
    clearState: false

# All (default on launch)
- assertVisible:
    id: "server_list_all"

# Favourites
- tapOn:
    id: "tab_fav"
- assertVisible:
    id: "server_list_fav"

# Static IPs
- tapOn:
    id: "tab_static"
- assertVisible:
    id: "server_list_static"

# Custom configs
- tapOn:
    id: "tab_config"
- assertVisible:
    id: "server_list_config"

# Back to All
- tapOn:
    id: "tab_all"
- assertVisible:
    id: "server_list_all"
