appId: com.windscribe.vpn
tags:
  - vpn
  - native
---
# Tests ROBERT DNS blocking.
# run.sh captures DNS_BEFORE (disconnected), then this flow connects and
# enables social filter, run.sh captures DNS_AFTER (connected + blocked),
# then calls 12-robert-dns-cleanup.yaml.

- launchApp:
    clearState: false

- assertVisible:
    id: "home_connect_button"

# ── Connect ───────────────────────────────────────────────────────────────────

- runFlow: ../subflows/connect.yaml

# ── Enable social filter ──────────────────────────────────────────────────────

- tapOn:
    id: "main_menu_button"
- tapOn:
    id: "menu_item_robert"
- assertVisible:
    id: "robert_screen"
- tapOn:
    id: "robert_toggle_off_social"
- assertVisible:
    id: "robert_toggle_on_social"
- waitForAnimationToEnd:
    timeout: 3000
- back
- back
- assertVisible:
    id: "home_connect_button"
